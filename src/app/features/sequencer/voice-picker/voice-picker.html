<span
  class="slot-swatch h-[22px] w-[22px] shrink-0 rounded-[7px] cat-{{ track().category }}"
></span>
<span class="w-4 shrink-0 font-mono text-[10px] font-bold text-slot-num">
  {{ trackNumber() }}
</span>
<div class="relative min-w-0 flex-1">
  <div
    class="picker-field flex items-center justify-between gap-2 rounded-[9px] px-[10px] py-2 text-[13px] font-semibold text-ink"
  >
    <span class="overflow-hidden text-ellipsis whitespace-nowrap">{{ track().name }}</span>
    <span class="shrink-0 text-[10px] text-eyebrow">▾</span>
  </div>
  <select
    class="absolute inset-0 h-full w-full cursor-pointer opacity-0"
    [attr.aria-label]="'Voice for track ' + trackNumber()"
    (change)="onChange($event)"
  >
    @for (group of voiceGroups; track group.label) {
      <optgroup [label]="group.label">
        @for (voice of group.voices; track voice.id) {
          <option [value]="voice.id" [selected]="voice.id === track().voice">
            {{ voice.name }}
          </option>
        }
      </optgroup>
    }
  </select>
</div>
