<section
  class="flex items-center gap-[18px] border-b px-[30px] py-5"
  style="border-color: var(--hairline); background: var(--transport-bg)"
>
  <app-ui-button variant="circle" ariaLabel="Play / Stop" (press)="togglePlay.emit()">
    @if (isPlaying()) {
      <span class="play-square"></span>
    } @else {
      <span class="play-triangle"></span>
    }
  </app-ui-button>

  <app-ui-button variant="pill" ariaLabel="Clear" (press)="clearPattern.emit()"
    >Clear</app-ui-button
  >

  <div class="ml-auto flex items-center gap-3">
    <div class="text-right">
      <div class="font-mono text-[28px] font-bold leading-none text-ink">{{ bpm() }}</div>
      <div class="text-[9px] font-medium uppercase tracking-[0.2em] text-mono">BPM</div>
    </div>
    <div class="flex flex-col gap-[5px]">
      <app-ui-button variant="stepper" ariaLabel="Increase BPM" (press)="bpmDelta.emit(2)">
        +
      </app-ui-button>
      <app-ui-button variant="stepper" ariaLabel="Decrease BPM" (press)="bpmDelta.emit(-2)">
        –
      </app-ui-button>
    </div>
  </div>
</section>
