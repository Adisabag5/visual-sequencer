<section class="px-[30px] py-[26px]">
  <!-- Ruler -->
  <div class="mb-3 grid grid-cols-[150px_1fr] items-center gap-[18px]">
    <div></div>
    <div class="flex gap-3">
      @for (g of groups; track g) {
        <div class="grid flex-1 grid-cols-4 gap-[9px]">
          @for (i of quarter; track i) {
            @let idx = g * 4 + i;
            <div
              class="text-center font-mono text-[10px] font-bold"
              [style.color]="rulerColor(idx)"
            >
              {{ ruler[idx] }}
            </div>
          }
        </div>
      }
    </div>
  </div>

  <!-- Tracks -->
  <div class="flex flex-col gap-3">
    @for (track of tracks(); track $index) {
      <app-track-row
        [track]="track"
        [currentStep]="currentStep()"
        [playing]="isPlaying()"
        [anySoloed]="anySoloed()"
        (stepToggle)="stepToggle.emit({ trackIndex: $index, stepIndex: $event })"
        (muteToggle)="muteToggle.emit($index)"
        (soloToggle)="soloToggle.emit($index)"
        (volumeChange)="volumeChange.emit({ trackIndex: $index, value: $event })"
        (pitchChange)="
          pitchChange.emit({ trackIndex: $index, stepIndex: $event.stepIndex, pitch: $event.pitch })
        "
      />
    }
  </div>
</section>
