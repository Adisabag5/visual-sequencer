<!-- Ruler -->
<div class="mb-3 grid grid-cols-[120px_1fr] items-center gap-[18px]">
  <div></div>
  <div class="flex gap-3">
    @for (g of beats; track g) {
      <div class="grid flex-1 grid-cols-4 gap-[9px]">
        @for (i of beats; track i) {
          @let idx = g * stepsPerBeat + i;
          <div
            class="ruler-slot text-center font-mono text-[10px] font-bold"
            [class.ruler-beat]="isBeat(idx)"
            [class.ruler-playhead]="isPlayheadCol(idx)"
          >
            {{ ruler[idx] }}
          </div>
        }
      </div>
    }
  </div>
</div>

<!-- Tracks -->
<div class="flex flex-col gap-[14px]">
  @for (track of tracks(); track $index) {
    <app-track-row
      [track]="track"
      [currentStep]="currentStep()"
      [playing]="isPlaying()"
      [anySoloed]="anySoloed()"
      (stepToggle)="stepToggle.emit({ trackIndex: $index, stepIndex: $event })"
      (muteToggle)="muteToggle.emit($index)"
      (soloToggle)="soloToggle.emit($index)"
      (volumeChange)="volumeChange.emit({ trackIndex: $index, value: $event })"
      (pitchChange)="
        pitchChange.emit({ trackIndex: $index, stepIndex: $event.stepIndex, pitch: $event.pitch })
      "
    />
  }
</div>
